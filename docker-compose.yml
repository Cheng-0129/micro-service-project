version: '3.8'

services:
  nacos:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/nacos-server:v2.4.0
    container_name: nacos
    restart: always
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/logs:/home/nacos/logs
    networks:
      - micro-net

  redis:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - micro-net

  user-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/user-service:latest
    container_name: user-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./config/user-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/user-service:/app/logs
    depends_on:
      - nacos
    networks:
      - micro-net

  stock-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/stock-service:latest
    container_name: stock-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
      - REDIS_HOST=redis
    volumes:
      - ./config/stock-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/stock-service:/app/logs
    depends_on:
      - nacos
      - redis
    networks:
      - micro-net

  order-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/order-service:latest
    container_name: order-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - ./config/order-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/order-service:/app/logs
    depends_on:
      - nacos
    networks:
      - micro-net

  gateway:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/gateway:latest
    container_name: gateway
    restart: always
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_SERVER_ADDR=nacos:8848
    volumes:
      - ./config/gateway/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/gateway:/app/logs
    depends_on:
      - nacos
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  redis-data: