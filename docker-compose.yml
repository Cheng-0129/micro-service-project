version: '3.8'

services:
  nacos:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/nacos-server:v2.4.0
    container_name: nacos
    restart: always
    environment:
      - MODE=standalone
      - PREFER_HOST_MODE=hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./nacos/logs:/home/nacos/logs
    networks:
      - micro-net

  redis:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/redis:7-alpine
    container_name: redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - micro-net

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=micro_service_project
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - micro-net

  seata-server:
    image: seataio/seata-server:2.0.0
    container_name: seata-server
    restart: always
    ports:
      - "8091:8091"
      - "7091:7091"
    environment:
      - SEATA_PORT=8091
      - logging.file.path=/root/logs/seata
    volumes:
      - ./seata/logs:/root/logs/seata
    networks:
      - micro-net

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: sentinel-dashboard
    restart: always
    ports:
      - "8089:8089"
    networks:
      - micro-net

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - micro-net

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: rocketmq-broker
    restart: always
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
    command: sh mqbroker -n rocketmq-namesrv:9876
    depends_on:
      - rocketmq-namesrv
    networks:
      - micro-net

  user-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/user-service:latest
    container_name: user-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos:8848
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./config/user-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/user-service:/app/logs
    depends_on:
      - nacos
      - postgres
    networks:
      - micro-net

  stock-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/stock-service:latest
    container_name: stock-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos:8848
      - REDIS_HOST=redis
      - SEATA_ADDR=seata-server:8091
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
    volumes:
      - ./config/stock-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/stock-service:/app/logs
    depends_on:
      - nacos
      - redis
      - postgres
      - seata-server
      - rocketmq-broker
    networks:
      - micro-net

  order-service:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/order-service:latest
    container_name: order-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos:8848
      - SEATA_ADDR=seata-server:8091
      - ROCKETMQ_NAME_SERVER=rocketmq-namesrv:9876
    volumes:
      - ./config/order-service/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/order-service:/app/logs
    depends_on:
      - nacos
      - postgres
      - seata-server
      - rocketmq-broker
    networks:
      - micro-net

  gateway:
    image: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com/city_xing/gateway:latest
    container_name: gateway
    restart: always
    ports:
      - "8088:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - NACOS_ADDR=nacos:8848
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./config/gateway/application-prod.yml:/app/config/application-prod.yml:ro
      - ./logs/gateway:/app/logs
    depends_on:
      - nacos
      - redis
    networks:
      - micro-net

networks:
  micro-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data: