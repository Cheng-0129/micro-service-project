logging:
  level:
    root: info
    com.spring.boot: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/userservice/app.log
  logback:
    rolling-policy:
      max-file-size: 50MB
      max-history: 3

knife4j:
  production: false

jwt:
  secret: test-local-jwt-secret-key-2026!!
  access-expire: 900000    # ✅ 15分钟（900000毫秒）
  refresh-expire: 604800000  # ✅ 7天（604800000毫秒）