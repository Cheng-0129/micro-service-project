spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/micro_service_project
    username: postgres
    password: root
    hikari:
      initialization-fail-timeout: 30000
      connection-timeout: 10000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        enabled: false
        import-check:
          enabled: false
  autoconfigure:
    exclude:
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration

jwt:
  secret: integration-test-secret-key-2026-integration
  access-expire: 900000
  refresh-expire: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always