logging:
  level:
    root: info
    com.spring.boot: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

knife4j:
  production: false

jwt:
  secret: dev-local-jwt-secret-key-2026!!!
  access-expire: 900000    # ✅ 15分钟（900000毫秒）
  refresh-expire: 604800000  # ✅ 7天（604800000毫秒）