spring:
  cloud:
    nacos:
      config:
        server-addr: nacos:8848
      discovery:
        server-addr: nacos:8848
  datasource:
    url: jdbc:postgresql://postgres:5432/micro_service_project
  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    root: warn
    com.spring.boot: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /app/logs/app.log
  logback:
    rolling-policy:
      max-file-size: 100MB
      max-history: 7

knife4j:
  production: true

jwt:
  secret: ${JWT_SECRET}
  access-expire: ${JWT_ACCESS_EXPIRE:900000}
  refresh-expire: ${JWT_REFRESH_EXPIRE:604800000}