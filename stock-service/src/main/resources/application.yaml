server:
  port: 8082

spring:
  import:
    - optional:nacos:stock-service.yaml
    - optional:nacos:common-config.yaml?group=DEFAULT_GROUP
  cloud:
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8089}
        port: ${random.int[8720,8820]}    # 随机端口，多实例不冲突
        client-ip: 127.0.0.1
      datasource:
        degrade: # 降级规则数据源
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            data-id: ${spring.application.name}-degrade-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/micro_service_project
    username: postgres
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mvc:
    throw-exception-if-no-handler-found: true
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  web:
    resources:
      add-mappings: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
  basic:
    enable: false
  setting:
    language: zh_cn

springdoc:
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true
  packages-to-scan: com.spring.boot.stockservice.controller
  paths-to-match: /**

seata:
  enabled: true
  tx-service-group: my_micro_service_group
  registry:
    type: file
  service:
    vgroup-mapping:
      my_micro_service_group: default
    grouplist:
      default: ${SEATA_ADDR:127.0.0.1:8091}
  client:
    rm:
      db-type: postgresql

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}

