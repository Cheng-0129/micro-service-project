server:
  port: 8088

spring:
  application:
    name: gateway
  profiles:
    active: dev
  cloud:
    nacos:
      # 配置中心
      config:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        file-extension: yaml
        shared-configs:
          - data-id: common-config.yaml
            group: DEFAULT_GROUP    # 最好显式指定
            refresh: true
      # 服务发现
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        ip: 127.0.0.1          # ← 加这行，注册到 Nacos 的 IP 改成 localhost