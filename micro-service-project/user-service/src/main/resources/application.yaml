server:
  port: 8081

spring:
  cloud:
    sentinel:
      eager: true
      transport:
        dashboard: 127.0.0.1:8089
        port: 8720        # 和网关的 8719 区别开
        client-ip: 127.0.0.1
      datasource:
        degrade: # 降级规则数据源
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-degrade-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: degrade
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/micro_service_project
    username: postgres
    password: root
  application:
    name: user-service
  profiles:
    active: test
  mvc:
    throw-exception-if-no-handler-found: true
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  web:
    resources:
      add-mappings: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
  production: false
  basic:
    enable: false
  setting:
    language: zh_cn

springdoc:
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true
  packages-to-scan: com.spring.boot.userservice.controller
  paths-to-match: /**

seata:
  enabled: true
  tx-service-group: my_micro_service_group
  registry:
    type: file
  service:
    vgroup-mapping:
      my_micro_service_group: default
    grouplist:
      default: 127.0.0.1:8091
  client:
    rm:
      db-type: postgresql