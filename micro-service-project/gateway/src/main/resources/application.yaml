server:
  port: 8088

spring:
  config:
    import:
      - optional:nacos:gateway.yaml
      - optional:nacos:common-config.yaml?group=DEFAULT_GROUP
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1

        - id: stock-service
          uri: lb://stock-service
          predicates:
            - Path=/stock-service/**
          filters:
            - StripPrefix=1
      globalcors:          #全局 CORS（跨域资源共享）
        cors-configurations:
          '[/**]':
            # TODO: 上线前改为具体前端域名，当前无前端，临时开放
            allowed-origin-patterns: "*"
            allowed-methods: "GET, POST, PUT, DELETE, OPTIONS"
            allowed-headers: "Content-Type, Authorization"
            max-age: 3600
    sentinel:
      eager: true
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8089}   # Sentinel Dashboard 地址
        port: ${random.int[8710,8720]}                   # 应用与 Dashboard 通信的端口（默认 8719）
        client-ip: 127.0.0.1
      datasource:
        gw-flow: # 网关流控规则数据源
          nacos:
            server-addr: ${NACOS_ADDR:127.0.0.1:8848}
            data-id: ${spring.application.name}-gw-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: gw-flow       # 规则类型：网关流控

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - gateway

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
  endpoint:
    gateway:
      enabled: true