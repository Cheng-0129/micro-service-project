server:
  port: 8088

spring:
  application:
    name: gateway
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        ip: 127.0.0.1          # ← 加这行，注册到 Nacos 的 IP 改成 localhost
    gateway:
      discovery:
        locator:
          enabled: false
          #lower-case-service-id: true
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/user-service/**
          filters:
            - StripPrefix=1
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order-service/**
          filters:
            - StripPrefix=1
        - id: stock-service
          uri: lb://stock-service
          predicates:
            - Path=/stock-service/**
          filters:
            - StripPrefix=1
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods: "GET, POST, PUT, DELETE, OPTIONS"
            allowed-headers: "Content-Type, Authorization"
            max-age: 3600
    sentinel:
      eager: true
      transport:
        dashboard: 127.0.0.1:8089   # Sentinel Dashboard 地址
        port: 8719                   # 应用与 Dashboard 通信的端口（默认 8719）
        client-ip: 127.0.0.1
      datasource:
        gw-flow: # 网关流控规则数据源
          nacos:
            server-addr: 127.0.0.1:8848
            data-id: ${spring.application.name}-gw-flow-rules
            group-id: SENTINEL_GROUP
            data-type: json
            rule-type: gw-flow       # 规则类型：网关流控

knife4j:
  gateway:
    enabled: true
    strategy: discover
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - gateway

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: gateway,health
  endpoint:
    gateway:
      enabled: true