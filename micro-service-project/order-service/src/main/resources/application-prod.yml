logging:
  level:
    root: warn
    com.spring.boot.orderservice: info
    org.mybatis: warn
    org.springframework.jdbc: warn
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: /var/log/orderservice/app.log
  logback:
    rolling-policy:
      max-file-size: 100MB
      max-history: 7

knife4j:
  production: true