server:
  port: 8082

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://127.0.0.1:5432/micro_service_project
    username: postgres
    password: root
  application:
    name: stock-service
  profiles:
    active: test
  mvc:
    throw-exception-if-no-handler-found: true
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  web:
    resources:
      add-mappings: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss

radis:
  host: localhost
  port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
  production: false
  basic:
    enable: false
  setting:
    language: zh_cn

springdoc:
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true
  packages-to-scan: com.spring.boot.stockservice.controller
  paths-to-match: /**

seata:
  enabled: true
  tx-service-group: my_micro_service_group
  registry:
    type: file
  service:
    vgroup-mapping:
      my_micro_service_group: default
    grouplist:
      default: 127.0.0.1:8091
  client:
    rm:
      db-type: postgresql