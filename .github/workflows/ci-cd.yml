# .github/workflows/ci-cd.yml
name: Micro Service CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DOCKER_REGISTRY: crpi-1iszvp3shb05ntyf.cn-hangzhou.personal.cr.aliyuncs.com

jobs:
  # ==================== 1. 编译 ====================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven 全量编译
        run: |
          mvn clean package -DskipTests=false -B

      - name: 上传各服务 Jar 包
        uses: actions/upload-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}
          path: |
            user-service/target/*.jar
            stock-service/target/*.jar
            order-service/target/*.jar
            gateway/target/*.jar
            !*-sources.jar
            !*-javadoc.jar
          retention-days: 7

  # ==================== 2. Docker 镜像构建（业务服务） ====================
  docker-build:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, stock-service, order-service, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Jar 包
        uses: actions/download-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}
          path: jars/

      - name: 准备 ${{ matrix.service }} 构建上下文
        run: |
          mkdir -p docker-context/${{ matrix.service }}
          
          if [ -f ${{ matrix.service }}/Dockerfile ]; then
            cp ${{ matrix.service }}/Dockerfile docker-context/${{ matrix.service }}/
          else
            cp Dockerfile docker-context/${{ matrix.service }}/
          fi
          
          # 关键修复：精确匹配 jar 包，避免多个 jar 时出错
          JAR_FILE=$(find jars/ -name "${{ matrix.service }}*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -1)
          if [ -z "$JAR_FILE" ]; then
            echo "错误: 未找到 ${{ matrix.service }} 的 jar 包"
            find jars/ -name "*.jar"
            exit 1
          fi
          cp "$JAR_FILE" docker-context/${{ matrix.service }}/app.jar
          
          echo "=== 构建上下文 ==="
          ls -la docker-context/${{ matrix.service }}/

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: 构建并推送 ${{ matrix.service }} 镜像
        run: |
          IMAGE_NAME=${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ matrix.service }}
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA::8}
          
          cd docker-context/${{ matrix.service }}
          
          docker build -t ${IMAGE_NAME}:${SHORT_SHA} .
          docker tag ${IMAGE_NAME}:${SHORT_SHA} ${IMAGE_NAME}:latest
          
          docker push ${IMAGE_NAME}:${SHORT_SHA}
          docker push ${IMAGE_NAME}:latest
          
          echo "✅ ${{ matrix.service }} 镜像推送完成: ${IMAGE_NAME}:${SHORT_SHA}"

  # ==================== 3. 推送基础镜像 ====================
  push-base-images:
    needs: build-and-test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: 拉取并推送 Java 基础镜像
        run: |
          docker pull eclipse-temurin:17-jre-alpine
          docker tag eclipse-temurin:17-jre-alpine ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/eclipse-temurin:17-jre-alpine
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/eclipse-temurin:17-jre-alpine

      - name: 拉取并推送 Nacos 镜像
        run: |
          docker pull nacos/nacos-server:v2.4.0
          docker tag nacos/nacos-server:v2.4.0 ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/nacos-server:v2.4.0
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/nacos-server:v2.4.0

      - name: 拉取并推送 Redis 镜像
        run: |
          docker pull redis:7-alpine
          docker tag redis:7-alpine ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/redis:7-alpine
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/redis:7-alpine

      - name: 拉取并推送 Seata 镜像
        run: |
          docker pull seataio/seata-server:2.0.0
          docker tag seataio/seata-server:2.0.0 ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/seata-server:2.0.0
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/seata-server:2.0.0

      - name: 拉取并推送 Sentinel 镜像
        run: |
          docker pull bladex/sentinel-dashboard:1.8.8
          docker tag bladex/sentinel-dashboard:1.8.8 ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/sentinel-dashboard:1.8.8
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/sentinel-dashboard:1.8.8

      - name: 拉取并推送 RocketMQ 镜像
        run: |
          docker pull apache/rocketmq:5.3.1
          docker tag apache/rocketmq:5.3.1 ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/rocketmq:5.3.1
          docker push ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/rocketmq:5.3.1

  # ==================== 4. 数据库迁移检查 ====================
  db-migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 SQL 脚本变更
        run: |
          CHANGED_SQL=$(git diff --name-only HEAD~1 HEAD | grep 'sql/' || true)
          if [ -n "$CHANGED_SQL" ]; then
            echo "⚠️  检测到数据库脚本变更："
            echo "$CHANGED_SQL"
            echo "请确认已在测试环境执行过迁移脚本"
          else
            echo "✅ 无数据库脚本变更"
          fi

  # ==================== 5. 部署（Self-hosted Runner） ====================
  deploy:
    needs: [ docker-build, db-migration-check ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - name: 环境预检查
        run: |
          # 检查 SSH key
          if [ ! -f ~/.ssh/id_ed25519 ] && [ ! -f ~/.ssh/id_rsa ]; then
            echo "❌ 未找到 SSH 私钥，请先配置 SSH key 并添加到 GitHub"
            echo "   参考: https://docs.github.com/en/authentication/connecting-to-github-with-ssh"
            exit 1
          fi

          # 创建必要目录
          mkdir -p /opt/micro-service-project/config/user-service
          mkdir -p /opt/micro-service-project/config/stock-service
          mkdir -p /opt/micro-service-project/config/order-service
          mkdir -p /opt/micro-service-project/config/gateway
          mkdir -p /opt/micro-service-project/sql
          mkdir -p /opt/micro-service-project/seata/logs
          mkdir -p /opt/micro-service-project/nacos/logs
          mkdir -p /opt/micro-service-project/nacos/data
          mkdir -p /opt/micro-service-project/logs/user-service
          mkdir -p /opt/micro-service-project/logs/stock-service
          mkdir -p /opt/micro-service-project/logs/order-service
          mkdir -p /opt/micro-service-project/logs/gateway

          echo "✅ 环境预检查完成"

      - name: 拉取代码
        run: |
          cd /home/ubuntu
          if [ -d repo ]; then
            cd repo && git pull
          else
            git clone --depth 1 -b main git@github.com:Cheng-0129/micro-service-project.git repo
          fi

      - name: 同步配置文件
        run: |
          cd /home/ubuntu/repo
          cp user-service/src/main/resources/application-prod.yml /opt/micro-service-project/config/user-service/
          cp stock-service/src/main/resources/application-prod.yml /opt/micro-service-project/config/stock-service/
          cp order-service/src/main/resources/application-prod.yml /opt/micro-service-project/config/order-service/
          cp gateway/src/main/resources/application-prod.yml /opt/micro-service-project/config/gateway/
          cp docker-compose.yml /opt/micro-service-project/
          mkdir -p /opt/micro-service-project/sql
          cp sql/init.sql /opt/micro-service-project/sql/

      - name: 部署服务
        run: |
          cd /opt/micro-service-project

          echo "=== 重启基础设施 ==="
          docker compose up -d nacos redis postgres

          echo "=== 等待 Nacos 就绪 ==="
          for i in $(seq 1 30); do
            if curl -s http://localhost:8848/nacos/v1/console/health/readiness | grep -qi "ok"; then
              echo "✅ Nacos 就绪"
              break
            fi
            echo "  等待 Nacos... ($i/30)"
            sleep 5
          done

          echo "=== 初始化数据库 ==="
          docker exec -i postgres psql -U postgres -d micro_service_project < /opt/micro-service-project/sql/init.sql 2>/dev/null || echo "数据库初始化完成"
          
          echo "=== 并行部署业务服务（gateway 除外）==="

          # 先并行拉取并启动三个业务服务
          for SERVICE in user-service stock-service order-service; do
            docker compose pull $SERVICE
            docker compose up -d --force-recreate $SERVICE
          done
  
          # 并行等待三个业务服务健康检查通过
          echo "等待业务服务启动..."
          for PORT in 8081 8082 8083; do
            (
              MAX_RETRIES=30
              RETRY_COUNT=0
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                HEALTH=$(curl -s http://localhost:${PORT}/actuator/health || echo "{}")
                if echo "$HEALTH" | grep -q '"status":"UP"'; then
                  echo "✅ 端口 ${PORT} 启动成功"
                  break
                fi
                RETRY_COUNT=$((RETRY_COUNT + 1))
                sleep 5
              done
              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "❌ 端口 ${PORT} 启动超时"
                exit 1
              fi
            ) &
          done
          wait
  
          echo ""
          echo ">>> 部署 gateway (端口: 8088)"
          docker compose pull gateway
          docker compose up -d --force-recreate gateway
  
          echo "等待 gateway 启动..."
          MAX_RETRIES=30
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HEALTH=$(curl -s http://localhost:8088/actuator/health || echo "{}")
            if echo "$HEALTH" | grep -q '"status":"UP"'; then
              echo "✅ gateway 启动成功"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "  等待中... ($RETRY_COUNT/$MAX_RETRIES)"
            sleep 5
          done
  
          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "❌ gateway 启动超时"
            docker compose logs --tail=50 gateway
            exit 1
          fi
          
          echo ""
          echo "=== 所有服务部署完成 ==="
          for PORT in 8081 8082 8083 8088; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${PORT}/actuator/health || echo "000")
            echo "  端口 ${PORT}: HTTP ${HTTP_CODE}"
          done
          
          echo ""
          echo "=== 清理旧镜像 ==="
          docker image prune -af --filter "until=72h"
          
          echo ""
          echo "✅ 部署完成！"

  # ==================== 6. 集成测试 ====================
  integration-test:
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - name: 拉取代码
        run: |
          cd /home/ubuntu
          if [ -d repo ]; then
            cd repo && git pull
          else
            git clone --depth 1 -b main git@github.com:Cheng-0129/micro-service-project.git repo
          fi

      - name: 运行集成测试
        run: |
          cd /home/ubuntu/repo
          mvn package -DskipTests -P integration-test -pl user-service,stock-service,order-service -am -B
          mvn verify -P integration-test -pl user-service,stock-service,order-service -am -B

  # ==================== 7. API 冒烟测试 ====================
  api-test:
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: self-hosted
    steps:
      - name: 拉取代码
        run: |
          cd /home/ubuntu
          if [ -d repo ]; then
            cd repo && git pull
          else
            git clone --depth 1 -b main git@github.com:Cheng-0129/micro-service-project.git repo
          fi

      - name: 运行 API 测试
        run: |
          cd /home/ubuntu/repo
          export PATH="$HOME/.npm-global/bin:$PATH"
          newman run postman-collection.json --reporters cli

  # ==================== 8. 失败通知 ====================
  notify:
    needs: [build-and-test, docker-build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 发送邮箱通知
        run: |
          TITLE="❌ CI/CD 失败 - 微服务项目"
          
          curl -X POST '${{ secrets.WECOM_WEBHOOK }}' \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"## ${TITLE}\n> 分支: ${{ github.ref_name }}\n> 提交: ${{ github.event.head_commit.message }}\n> 提交者: ${{ github.actor }}\n> [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}}"