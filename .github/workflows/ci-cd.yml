# .github/workflows/ci-cd.yml
name: Micro Service CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  DOCKER_REGISTRY: registry.cn-hangzhou.aliyuncs.com

jobs:
  # ==================== 1. 编译 ====================
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      changed_modules: ${{ steps.detect_changes.outputs.modules }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 确认代码目录
        run: |
          pwd
          ls -la
          ls pom.xml

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 检测变更模块
        id: detect_changes
        run: |
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          MODULES=""
          
          if echo "$CHANGED_FILES" | grep -q "common-core/\|common-web/\|^pom\.xml$"; then
            MODULES="all"
          else
            if echo "$CHANGED_FILES" | grep -q "user-service/"; then
              MODULES="$MODULES,user-service"
            fi
            if echo "$CHANGED_FILES" | grep -q "stock-service/"; then
              MODULES="$MODULES,stock-service"
            fi
            if echo "$CHANGED_FILES" | grep -q "order-service/"; then
              MODULES="$MODULES,order-service"
            fi
            if echo "$CHANGED_FILES" | grep -q "gateway/"; then
              MODULES="$MODULES,gateway"
            fi
          
            if [ -z "$MODULES" ]; then
              MODULES="all"
            else
              MODULES=${MODULES#,}
            fi
          fi
          
          echo "modules=$MODULES" >> $GITHUB_OUTPUT
          echo "变更模块: $MODULES"

      - name: Maven 全量编译
        if: steps.detect_changes.outputs.modules == 'all'
        run: |
          mvn clean package -DskipTests=true -B

      - name: Maven 增量编译
        if: steps.detect_changes.outputs.modules != 'all'
        run: |
          MODULES="${{ steps.detect_changes.outputs.modules }}"
          mvn clean package -DskipTests=true -pl ${MODULES} -am -B

      - name: 上传各服务 Jar 包
        uses: actions/upload-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}
          path: |
            user-service/target/*.jar
            stock-service/target/*.jar
            order-service/target/*.jar
            gateway/target/*.jar
            !*-sources.jar
            !*-javadoc.jar
          retention-days: 7

  # ==================== 2. Docker 镜像构建 ====================
  docker-build:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, stock-service, order-service, gateway]
    steps:
      - uses: actions/checkout@v4

      - name: 下载 Jar 包
        uses: actions/download-artifact@v4
        with:
          name: service-jars-${{ github.run_id }}
          path: jars/

      - name: 准备 ${{ matrix.service }} 构建上下文
        run: |
          mkdir -p docker-context/${{ matrix.service }}
          
          if [ -f ${{ matrix.service }}/Dockerfile ]; then
            cp ${{ matrix.service }}/Dockerfile docker-context/${{ matrix.service }}/
          else
            cp Dockerfile docker-context/${{ matrix.service }}/
          fi
          
          find jars/ -name "*.jar" -path "*${{ matrix.service }}*" ! -name "*sources*" ! -name "*javadoc*" -exec cp {} docker-context/${{ matrix.service }}/app.jar \;
          
          if [ ! -f docker-context/${{ matrix.service }}/app.jar ]; then
            echo "错误: 未找到 ${{ matrix.service }} 的 jar 包"
            exit 1
          fi

      - name: 登录阿里云镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.ALIYUN_DOCKER_USERNAME }}
          password: ${{ secrets.ALIYUN_DOCKER_PASSWORD }}

      - name: 构建并推送 ${{ matrix.service }} 镜像
        run: |
          IMAGE_NAME=${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ matrix.service }}
          SHORT_SHA=${{ github.sha }}
          SHORT_SHA=${SHORT_SHA::8}
          
          cd docker-context/${{ matrix.service }}
          
          docker build -t ${IMAGE_NAME}:${SHORT_SHA} .
          docker tag ${IMAGE_NAME}:${SHORT_SHA} ${IMAGE_NAME}:latest
          
          docker push ${IMAGE_NAME}:${SHORT_SHA}
          docker push ${IMAGE_NAME}:latest

  # ==================== 3. 数据库迁移检查 ====================
  db-migration-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检查 SQL 脚本变更
        run: |
          CHANGED_SQL=$(git diff --name-only HEAD~1 HEAD | grep 'sql/' || true)
          if [ -n "$CHANGED_SQL" ]; then
            echo "⚠️  检测到数据库脚本变更："
            echo "$CHANGED_SQL"
            echo "请确认已在测试环境执行过迁移脚本"
          else
            echo "✅ 无数据库脚本变更"
          fi

  # ==================== 4. 部署 ====================
  deploy:
    needs: [docker-build, db-migration-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /opt/micro-service-project
            
            echo "=== 拉取最新镜像 ==="
            for SERVICE in user-service stock-service order-service gateway; do
              docker pull ${{ env.DOCKER_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${SERVICE}:latest &
            done
            wait
            echo "✅ 镜像拉取完成"
            
            echo "=== 重启基础设施 ==="
            docker compose up -d nacos redis
            sleep 15
            
            echo "=== 按顺序重启业务服务 ==="
            
            SERVICES=("user-service" "stock-service" "order-service" "gateway")
            PORTS=(8081 8082 8083 8088)
            
            for i in "${!SERVICES[@]}"; do
              SERVICE=${SERVICES[$i]}
              PORT=${PORTS[$i]}
            
              echo ""
              echo ">>> 部署 $SERVICE (端口: $PORT)"
            
              docker compose up -d $SERVICE
            
              echo "等待 $SERVICE 启动..."
              MAX_RETRIES=30
              RETRY_COUNT=0
            
              while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${PORT}/actuator/health || echo "000")
            
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "✅ $SERVICE 启动成功 (HTTP $HTTP_CODE)"
                  break
                fi
            
                RETRY_COUNT=$((RETRY_COUNT + 1))
                echo "  等待中... ($RETRY_COUNT/$MAX_RETRIES) HTTP: $HTTP_CODE"
                sleep 5
              done
            
              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "❌ $SERVICE 启动超时"
                docker compose logs --tail=50 $SERVICE
                exit 1
              fi
            
              sleep 10
            done
            
            echo ""
            echo "=== 所有服务部署完成 ==="
            for PORT in 8081 8082 8083 8088; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${PORT}/actuator/health || echo "000")
              echo "  端口 ${PORT}: HTTP ${HTTP_CODE}"
            done
            
            echo ""
            echo "=== 清理旧镜像 ==="
            docker image prune -af --filter "until=72h"
            
            echo ""
            echo "✅ 部署完成！"

  # ==================== 5. 失败通知 ====================
  notify:
    needs: [build-and-test, docker-build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: 发送企业微信通知
        run: |
          TITLE="❌ CI/CD 失败 - 微服务项目"
          
          curl -X POST '${{ secrets.WECOM_WEBHOOK }}' \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"## ${TITLE}\n> 分支: ${{ github.ref_name }}\n> 提交: ${{ github.event.head_commit.message }}\n> 提交者: ${{ github.actor }}\n> [查看详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\"}}"