spring:
  cloud:
    nacos:
      config:
        enabled: false

seata:
  registry:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
  tx-service-group: my_micro_service_group
  service:
    vgroup-mapping:
      my_micro_service_group: default
    grouplist:
      default: 127.0.0.1:8091

rocketmq:
  name-server: 127.0.0.1:9876