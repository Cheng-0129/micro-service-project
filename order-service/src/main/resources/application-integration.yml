spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/micro_service_project
    username: postgres
    password: root
    hikari:
      initialization-fail-timeout: 30000
      connection-timeout: 10000
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848

seata:
  registry:
    type: nacos
    nacos:
      server-addr: 127.0.0.1:8848
  tx-service-group: my_micro_service_group
  service:
    vgroup-mapping:
      my_micro_service_group: default
    grouplist:
      default: 127.0.0.1:8091

rocketmq:
  name-server: 127.0.0.1:9876

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always